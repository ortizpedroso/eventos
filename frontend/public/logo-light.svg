<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 152 36" fill="none" role="img" aria-label="EventosBR">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="36" y2="36" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#064e3b"/>
    </linearGradient>
  </defs>

  <!-- Icon: same gradient icon on dark backgrounds -->
  <rect width="36" height="36" rx="9" fill="url(#g)"/>

  <!-- Ticket body with right-side notch -->
  <path fill="white" fill-opacity="0.93"
    d="M11 8 Q9 8 9 10 L9 26 Q9 28 11 28 L25 28 Q27 28 27 26
       L27 21.5 A3.5 3.5 0 0 0 27 14.5 L27 10 Q27 8 25 8 Z"/>

  <!-- Star -->
  <path fill="#065f46"
    d="M17.5 13.5 L18.6 16.5 L21.8 16.6 L19.3 18.6 L20.2 21.6
       L17.5 19.9 L14.8 21.6 L15.7 18.6 L13.2 16.6 L16.4 16.5 Z"/>

  <!-- Wordmark: white "Eventos" + emerald-300 "BR" for dark backgrounds -->
  <text x="44" y="24"
    font-family="system-ui,-apple-system,sans-serif"
    font-size="18" font-weight="800"
    fill="#f4f4f5">Eventos</text>
  <text x="119" y="24"
    font-family="system-ui,-apple-system,sans-serif"
    font-size="18" font-weight="800"
    fill="#6ee7b7">BR</text>
</svg>
