# Produção (VPS Hostinger ou similar) — sem bind mount do código-fonte.
# Uso: cp .env.production.example .env  →  editar  →  docker compose -f docker-compose.prod.yml up -d --build
#
# Após alterar .env: docker compose -f docker-compose.prod.yml up -d (recria containers com novas vars).

services:
  api:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg2://eventosbr:${POSTGRES_PASSWORD}@db:5432/eventosbr
      REDIS_URL: redis://redis:6379
      ENVIRONMENT: production
      DEBUG: "False"
      TRUST_FORWARDED_HEADERS: "true"
    expose:
      - "8000"
    command:
      - /bin/sh
      - -c
      - "alembic upgrade head && exec uvicorn app.main:app --host 0.0.0.0 --port 8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/ready', timeout=8)",
        ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 120s
    networks:
      - eventosbr_internal

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: eventosbr
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: eventosbr
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eventosbr -d eventosbr"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - eventosbr_internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - eventosbr_internal

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://${DOMAIN}}
        NEXT_PUBLIC_PAYMENT_PROVIDER: ${PAYMENT_PROVIDER:-asaas}
        NEXT_PUBLIC_GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
        NEXT_PUBLIC_BUILD_SHA: ${GIT_COMMIT:-dev}
    restart: unless-stopped
    environment:
      INTERNAL_API_URL: http://api:8000
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://${DOMAIN}}
    expose:
      - "3000"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - eventosbr_internal

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL:-}
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
    networks:
      - eventosbr_internal

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:

networks:
  eventosbr_internal:
    driver: bridge
