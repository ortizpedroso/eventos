name: CI

on:
  push:
    branches: [main, master, "cursor/**"]
  pull_request:

jobs:
  api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Instalar dependências
        run: pip install -r requirements.txt
      - name: Pytest
        run: python -m pytest tests/ -q --tb=short

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: npm ci
        run: npm ci
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://127.0.0.1:8000
          NEXT_PUBLIC_PAYMENT_PROVIDER: asaas

  e2e:
    runs-on: ubuntu-latest
    needs: web
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: npm ci
        run: npm ci
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://127.0.0.1:8000
          NEXT_PUBLIC_PAYMENT_PROVIDER: asaas
      - name: Remover repositórios apt não usados (evita flake do runner)
        run: sudo grep -rl "packages.microsoft.com" /etc/apt/sources.list.d/ 2>/dev/null | xargs -r sudo rm -f; sudo apt-get update -qq || true
      - name: Instalar browsers Playwright
        run: npx playwright install chromium --with-deps
      - name: Testes E2E smoke
        run: npm run test:e2e
        env:
          CI: true
          PLAYWRIGHT_SKIP_API_CHECK: "1"

  prod-compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validar docker-compose.prod.yml
        run: |
          cp .env.production.example .env
          docker compose -f docker-compose.prod.yml config --quiet
          echo "docker-compose.prod.yml OK"

  e2e-compra:
    runs-on: ubuntu-latest
    needs: [api, web]
    steps:
      - uses: actions/checkout@v4
      - name: Subir stack E2E
        run: docker compose -p eventosbr-e2e -f docker-compose.e2e.yml up -d --build --wait
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: npm ci
        working-directory: frontend
        run: npm ci
      - name: Remover repositórios apt não usados (evita flake do runner)
        run: sudo grep -rl "packages.microsoft.com" /etc/apt/sources.list.d/ 2>/dev/null | xargs -r sudo rm -f; sudo apt-get update -qq || true
      - name: Instalar browsers Playwright
        working-directory: frontend
        run: npx playwright install chromium --with-deps
      - name: Teste E2E compra (Asaas mock)
        working-directory: frontend
        run: npm run test:e2e:compra
        env:
          CI: true
          PLAYWRIGHT_SKIP_WEBSERVER: "1"
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000
          PLAYWRIGHT_API_URL: http://127.0.0.1:8000
      - name: Testes E2E patamar (com API)
        working-directory: frontend
        run: >
          npx playwright test --project=patamar
          -g "lista de interesse|lista de espera|produtor|perfil mantém menu"
        env:
          CI: true
          PLAYWRIGHT_SKIP_WEBSERVER: "1"
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000
          PLAYWRIGHT_API_URL: http://127.0.0.1:8000

  e2e-asaas:
    runs-on: ubuntu-latest
    needs: [api, web]
    steps:
      - uses: actions/checkout@v4
      - name: Subir stack E2E Asaas
        run: |
          docker compose -p eventosbr-e2e-asaas -f docker-compose.e2e.yml -f docker-compose.e2e.asaas.yml up -d --build --wait
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: npm ci
        working-directory: frontend
        run: npm ci
      - name: Remover repositórios apt não usados (evita flake do runner)
        run: sudo grep -rl "packages.microsoft.com" /etc/apt/sources.list.d/ 2>/dev/null | xargs -r sudo rm -f; sudo apt-get update -qq || true
      - name: Instalar browsers Playwright
        working-directory: frontend
        run: npx playwright install chromium --with-deps
      - name: Teste E2E checkout Asaas (copy + PIX)
        working-directory: frontend
        run: npm run test:e2e:asaas
        env:
          CI: true
          PLAYWRIGHT_SKIP_WEBSERVER: "1"
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000
          PLAYWRIGHT_API_URL: http://127.0.0.1:8000
