# Configuração limpa do Docker Compose - EventosBR

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+psycopg2://eventosbr:eventosbr@db:5432/eventosbr
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - STRIPE_DISABLED=${STRIPE_DISABLED:-false}
      - STRIPE_SKIP_CONNECT_ON_REGISTER=${STRIPE_SKIP_CONNECT_ON_REGISTER:-false}
      - PLATFORM_ADMIN_API_KEY=${PLATFORM_ADMIN_API_KEY:-}
      - EMAIL_SERVER=${EMAIL_SERVER:-smtp.gmail.com}
      - EMAIL_PORT=${EMAIL_PORT:-587}
      - EMAIL_USER=${EMAIL_USER:-}
      - EMAIL_PASSWORD=${EMAIL_PASSWORD:-}
      - EMAIL_FROM_NAME=${EMAIL_FROM_NAME:-EventosBR}
      - EMAIL_USE_TLS=${EMAIL_USE_TLS:-true}
      - FRONTEND_PUBLIC_URL=${FRONTEND_PUBLIC_URL:-http://localhost:3000}
      - MARKETING_WHATSAPP_WEBHOOK_URL=${MARKETING_WHATSAPP_WEBHOOK_URL:-}
      - SECRET_KEY=${SECRET_KEY}
      - GOOGLE_OAUTH_CLIENT_ID=${GOOGLE_OAUTH_CLIENT_ID:-}
      - DEBUG=False
      - REDIS_URL=redis://redis:6379
      - ENVIRONMENT=production
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      - RATE_LIMIT_USE_REDIS=${RATE_LIMIT_USE_REDIS:-true}
      - TICKET_EMAIL_USE_REDIS=${TICKET_EMAIL_USE_REDIS:-true}
      - TICKET_EMAIL_MAX_ATTEMPTS=${TICKET_EMAIL_MAX_ATTEMPTS:-3}
      - TRUST_FORWARDED_HEADERS=${TRUST_FORWARDED_HEADERS:-false}
    # Comando inline evita CRLF em scripts shell no bind mount Windows (.:/app)
    command:
      - /bin/sh
      - -c
      - "alembic upgrade head && exec uvicorn app.main:app --host 0.0.0.0 --port 8000"
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/ready', timeout=8)",
        ]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 120s
    networks:
      - eventosbr_network

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=eventosbr
      - POSTGRES_PASSWORD=eventosbr
      - POSTGRES_DB=eventosbr
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eventosbr -d eventosbr"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - eventosbr_network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - eventosbr_network

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
        API_PROXY_TARGET: http://api:8000
        NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY}
        NEXT_PUBLIC_GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
        NEXT_PUBLIC_LAN_ORIGIN: ${FRONTEND_PUBLIC_URL:-http://localhost:3000}
    environment:
      - INTERNAL_API_URL=http://api:8000
      - API_PROXY_TARGET=http://api:8000
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - eventosbr_network

volumes:
  redis_data:
  postgres_data:

networks:
  eventosbr_network:
    driver: bridge
